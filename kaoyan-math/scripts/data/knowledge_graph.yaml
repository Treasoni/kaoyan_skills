# 考研数学知识点关系图
# 用于生成主动关联提示

高等数学:
  洛必达法则:
    prerequisites:
      - 极限定义
      - 导数定义
    combinations:
      - 等价无穷小
      - 泰勒公式
    applications:
      - 定积分应用
      - 变限积分求导
    cross_chapter_prompts:
      - "注意：当遇到变限积分求导时，通常会结合洛必达法则考查"
      - "建议：同时复习 [[定积分应用]] 中的变限积分部分"
      - "关联：洛必达法则常与泰勒公式结合考查极限问题"
      - "提醒：使用前必须验证0/0或∞/∞型条件"

  泰勒公式:
    prerequisites:
      - 导数定义
      - 高阶导数
    combinations:
      - 洛必达法则
      - 等价无穷小
    applications:
      - 级数展开
      - 近似计算
      - 极限计算
    cross_chapter_prompts:
      - "注意：泰勒公式在处理复杂函数极限时比洛必达法则更简洁"
      - "建议：掌握常见函数的泰勒展开式（sin x, cos x, e^x, ln(1+x)）"
      - "关联：泰勒公式是级数展开的基础，参考 [[幂级数]]"
      - "提醒：泰勒公式的余项形式（佩亚诺/拉格朗日）要区分清楚"

  变限积分求导:
    prerequisites:
      - 定积分定义
      - 导数定义
      - 牛顿-莱布尼茨公式
    combinations:
      - 洛必达法则
      - 复合函数求导
    applications:
      - 积分方程
      - 微分方程
    cross_chapter_prompts:
      - "注意：变限积分求导常与洛必达法则结合考查极限"
      - "建议：熟练掌握牛顿-莱布尼茨公式和链式法则"
      - "关联：遇到积分方程时，常需先求导转化为微分方程"
      - "提醒：注意上限是函数时的链式法则应用"

  微分中值定理:
    prerequisites:
      - 导数定义
      - 函数连续性
    combinations:
      - 极值问题
      - 不等式证明
    applications:
      - 函数性质研究
      - 方程根的存在性
    cross_chapter_prompts:
      - "注意：罗尔定理是拉格朗日中值定理的特殊情况"
      - "建议：理解辅助函数构造方法"
      - "关联：中值定理是不等式证明的重要工具"
      - "提醒：使用时必须验证定理条件（连续、可导、端点值）"

  定积分应用:
    prerequisites:
      - 定积分定义
      - 牛顿-莱布尼茨公式
    combinations:
      - 变限积分求导
      - 反常积分
    applications:
      - 几何应用（面积、体积、弧长）
      - 物理应用（功、压力、引力）
    cross_chapter_prompts:
      - "注意：定积分应用题常结合变限积分求导考查"
      - "建议：掌握元素法（微元法）的思路"
      - "关联：反常积分是定积分的推广"
      - "提醒：注意对称性在几何计算中的应用"

  反常积分:
    prerequisites:
      - 定积分定义
      - 极限计算
    combinations:
      - 定积分应用
      - 级数收敛
    applications:
      - 概率统计
      - 物理应用
    cross_chapter_prompts:
      - "注意：反常积分敛散性判定与级数敛散性判定方法类似"
      - "建议：掌握比较判别法和极限判别法"
      - "关联：参考 [[无穷级数]] 的敛散性判定"
      - "提醒：无穷区间积分和无界函数积分要区分"

  级数展开:
    prerequisites:
      - 泰勒公式
      - 幂级数
    combinations:
      - 近似计算
      - 微分方程求解
    applications:
      - 函数逼近
      - 数值计算
    cross_chapter_prompts:
      - "注意：函数展开为幂级数是泰勒公式的推广"
      - "建议：牢记常见函数的麦克劳林级数"
      - "关联：幂级数的收敛半径需要单独计算"
      - "提醒：注意收敛域的端点检验"

线性代数:
  矩阵运算:
    prerequisites:
      - 行列式定义
    combinations:
      - 线性方程组
      - 特征值
    applications:
      - 线性变换
      - 二次型
    cross_chapter_prompts:
      - "注意：矩阵乘法不满足交换律"
      - "建议：熟练掌握矩阵的初等变换"
      - "关联：矩阵的秩与线性方程组解的结构密切相关"
      - "提醒：注意逆矩阵存在的条件"

  线性方程组:
    prerequisites:
      - 矩阵运算
      - 行列式
    combinations:
      - 向量组的线性相关性
      - 矩阵的秩
    applications:
      - 解的结构判定
      - 基础解系
    cross_chapter_prompts:
      - "注意：方程组有解的判定定理（秩相等）"
      - "建议：掌握用初等行变换求通解的方法"
      - "关联：基础解系与向量组的极大线性无关组相关"
      - "提醒：齐次与非齐次方程组的解结构要区分"

  特征值与特征向量:
    prerequisites:
      - 矩阵运算
      - 行列式
    combinations:
      - 矩阵对角化
      - 二次型
    applications:
      - 矩阵对角化
      - 微分方程组
    cross_chapter_prompts:
      - "注意：实对称矩阵的特征值都是实数"
      - "建议：掌握特征值的性质（迹、行列式）"
      - "关联：矩阵可对角化的充要条件是有n个线性无关的特征向量"
      - "提醒：不同特征值对应的特征向量线性无关"

  二次型:
    prerequisites:
      - 特征值与特征向量
      - 矩阵运算
    combinations:
      - 矩阵对角化
      - 正定矩阵
    applications:
      - 二次曲面分类
      - 最优化问题
    cross_chapter_prompts:
      - "注意：二次型的矩阵是对称矩阵"
      - "建议：掌握配方法和正交变换法化为标准形"
      - "关联：正定二次型的判定与特征值符号相关"
      - "提醒：惯性定理是二次型的重要性质"

概率论与数理统计:
  条件概率:
    prerequisites:
      - 概率定义
      - 古典概型
    combinations:
      - 全概率公式
      - 贝叶斯公式
      - 独立性
    applications:
      - 复杂事件概率计算
      - 诊断问题
    cross_chapter_prompts:
      - "注意：条件概率不是独立事件的反面"
      - "建议：理解条件概率的定义和直观意义"
      - "关联：全概率公式和贝叶斯公式基于条件概率"
      - "提醒：区分P(A|B)和P(B|A)"

  随机变量:
    prerequisites:
      - 概率基础
      - 概率公理
    combinations:
      - 分布函数
      - 数字特征
    applications:
      - 概率建模
      - 统计推断
    cross_chapter_prompts:
      - "注意：离散型和连续型随机变量的处理方法不同"
      - "建议：熟练掌握分布函数的定义和性质"
      - "关联：随机变量函数的分布是重要考点"
      - "提醒：分布函数右连续，取值在[0,1]"

  常用分布:
    prerequisites:
      - 随机变量
      - 分布函数
    combinations:
      - 数字特征
      - 极限定理
    applications:
      - 概率计算
      - 统计建模
    cross_chapter_prompts:
      - "注意：正态分布的概率密度函数图像特点"
      - "建议：牢记常用分布的期望和方差公式"
      - "关联：中心极限定理涉及正态分布"
      - "提醒：二项分布泊松近似和正态近似的条件"

  数字特征:
    prerequisites:
      - 随机变量
      - 常用分布
    combinations:
      - 方差
      - 协方差
      - 相关系数
    applications:
      - 风险度量
      - 数据分析
    cross_chapter_prompts:
      - "注意：期望是线性的，但方差不是"
      - "建议：掌握期望和方差的性质和计算公式"
      - "关联：协方差和相关系数描述变量间关系"
      - "提醒：独立必然不相关，反之不成立（正态分布除外）"

  大数定律与中心极限定理:
    prerequisites:
      - 数字特征
      - 常用分布
    combinations:
      - 正态分布
      - 样本均值
    applications:
      - 概率近似计算
      - 统计推断基础
    cross_chapter_prompts:
      - "注意：中心极限定理是正态分布广泛应用的理论基础"
      - "建议：理解大数定律和中心极限定理的条件和结论"
      - "关联：抽样分布基于中心极限定理"
      - "提醒：区分弱大数定律和强大数定律"

# 跨模块关联提示
跨模块关联:
  高数与线代:
    - "注意：向量组的线性相关性是线性代数的核心概念"
    - "建议：理解向量空间与三维几何空间的类比"
    - "关联：矩阵的特征值问题可用于微分方程组求解"

  高数与概率:
    - "注意：概率中的密度函数积分必须为1"
    - "建议：掌握积分在概率计算中的应用"
    - "关联：正态分布涉及高数中的广义积分"

  线代与概率:
    - "注意：协方差矩阵是二次型的应用"
    - "建议：理解多元正态分布的矩阵表示"
    - "关联：主成分分析基于特征值分解"
