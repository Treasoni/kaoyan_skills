# 822电子技术基础知识图谱
# 湖南大学考研专用

# 模电知识图谱
模拟电路:
  基本电子器件:
    name: "基本电子器件"
    chapter: 1
    difficulty: 3
    importance: 4
    exam_frequency: "中"
    prerequisites:
      - "电路基础"
    combinations:
      - "基本放大器"
      - "整流电路"
    applications:
      - "电源电路"
      - "放大电路"
    cross_chapter_prompts:
      - "注意：二极管单向导电性是整流的基础"
      - "提醒：BJT的三个工作区（截止、放大、饱和）要牢记"
      - "关联：FET与BJT的特性对比是常考点"
    sub_topics:
      - 二极管特性
      - 稳压管特性
      - BJT特性曲线
      - FET特性曲线
      - 器件参数含义

  基本放大器:
    name: "基本放大器"
    chapter: 2
    difficulty: 4
    importance: 5
    exam_frequency: "高"
    prerequisites:
      - "基本电子器件"
      - "电路分析基础"
    combinations:
      - "多级放大"
      - "负反馈放大器"
    applications:
      - "差分放大"
      - "功率放大"
      - "集成运放"
    cross_chapter_prompts:
      - "注意：掌握三种基本组态（共射/共基/共集）的对比"
      - "提醒：静态分析和动态分析要分开进行，不要混淆"
      - "重点：$A_u, R_i, R_o$的计算是必考内容"
      - "关联：多级放大器的总增益等于各级增益之积"
    sub_topics:
      - 共射放大电路
      - 共集放大电路
      - 共基放大电路
      - 静态工作点
      - 微变等效电路
      - 频率响应

  差分放大器:
    name: "差分放大器"
    chapter: 3
    difficulty: 4
    importance: 5
    exam_frequency: "高"
    prerequisites:
      - "基本放大器"
      - "对称性概念"
    combinations:
      - "集成运放"
      - "功率放大器"
    applications:
      - "直流放大"
      - "抑制共模干扰"
      - "集成运放输入级"
    cross_chapter_prompts:
      - "注意：共模抑制比$K_{CMRR}$是关键指标"
      - "提醒：掌握双入双出、单入双出等四种接法的区别"
      - "重点：差模增益和共模增益的计算"
      - "关联：差分放大是集成运放的基础"
    sub_topics:
      - 差模信号
      - 共模信号
      - 共模抑制比
      - 四种接法
      - 双端输出
      - 单端输出

  功率放大器:
    name: "功率放大器"
    chapter: 4
    difficulty: 3
    importance: 4
    exam_frequency: "中"
    prerequisites:
      - "基本放大器"
      - "图解法"
    combinations:
      - "OCL电路"
      - "OTL电路"
    applications:
      - "音频放大"
      - "电机驱动"
      - "射频放大"
    cross_chapter_prompts:
      - "注意：甲类、乙类、甲乙类的效率对比是常考点"
      - "提醒：交越失真的产生原因和消除方法"
      - "重点：$P_o, P_V, P_T, \eta$的计算"
      - "关联：功率放大管的安全工作区"
    sub_topics:
      - 甲类功放
      - 乙类功放
      - 甲乙类功放
      - OCL电路
      - OTL电路
      - 交越失真
      - 效率计算
      - 管耗计算

  集成运放:
    name: "集成运放"
    chapter: 5
    difficulty: 4
    importance: 5
    exam_frequency: "高"
    prerequisites:
      - "差分放大"
      - "负反馈"
    combinations:
      - "运算电路"
      - "有源滤波"
      - "电压比较器"
    applications:
      - "信号运算"
      - "信号处理"
      - "波形产生"
    cross_chapter_prompts:
      - "注意：虚短虚断是解题关键，必须牢记"
      - "提醒：线性应用和非线性应用要区分"
      - "重点：比例、加法、减法、积分、微分运算"
      - "关联：运放是模电的核心器件，应用广泛"
    sub_topics:
      - 虚短
      - 虚断
      - 比例运算
      - 加法运算
      - 减法运算
      - 积分微分
      - 有源滤波
      - 电压比较器

  负反馈放大器:
    name: "负反馈放大器"
    chapter: 6
    difficulty: 5
    importance: 5
    exam_frequency: "高"
    prerequisites:
      - "基本放大器"
      - "频率响应"
    combinations:
      - "运算电路"
      - "波形产生电路"
    applications:
      - "稳定增益"
      - "展宽频带"
      - "减小失真"
    cross_chapter_prompts:
      - "注意：深度负反馈是高频考点，$A_f \\approx 1/F$"
      - "提醒：反馈类型判断是难点，需要大量练习"
      - "重点：四种组态的判断方法（电压/电流、串联/并联）"
      - "关联：负反馈改善性能的本质是牺牲增益"
      - "记忆：短路输出端法判断电压/电流反馈"
    sub_topics:
      - 反馈类型判断
      - 电压反馈
      - 电流反馈
      - 串联反馈
      - 并联反馈
      - 深度负反馈
      - 反馈深度

  波形产生电路:
    name: "波形产生电路"
    chapter: 7
    difficulty: 4
    importance: 4
    exam_frequency: "中"
    prerequisites:
      - "集成运放"
      - "正反馈"
    combinations:
      - "正弦波振荡"
      - "非正弦波产生"
    applications:
      - "信号源"
      - "时钟发生"
      - "函数发生器"
    cross_chapter_prompts:
      - "注意：起振条件$|AF| \\geq 1$和平衡条件$|AF| = 1$"
      - "提醒：相位条件$\\varphi_A + \\varphi_F = 2n\\pi$"
      - "重点：RC、LC、石英晶体振荡器的特点和频率计算"
      - "关联：振荡器是正反馈的典型应用"
    sub_topics:
      - 正弦波振荡
      - RC振荡器
      - LC振荡器
      - 石英晶体振荡
      - 方波发生
      - 三角波发生
      - 起振条件

  稳压电源:
    name: "线性稳压电源"
    chapter: 8
    difficulty: 3
    importance: 4
    exam_frequency: "中"
    prerequisites:
      - "二极管特性"
      - "运算放大器"
      - "负反馈"
    combinations:
