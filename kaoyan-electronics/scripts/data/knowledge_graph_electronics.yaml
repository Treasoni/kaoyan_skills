      tips: "掌握短路法和瞬时极性法"
    - name: "静态工作点计算"
      frequency: "极高"
      difficulty: "中"
      tips: "不要忘记减去$U_{BE}$"
    - name: "差分放大电路"
      frequency: "高"
      difficulty: "中"
      tips: "注意四种接法的区别"
    - name: "运算电路"
      frequency: "高"
      difficulty: "中"
      tips: "虚短虚断是关键"
    - name: "功率放大器"
      frequency: "中"
      difficulty: "中"
      tips: "效率计算和交越失真"

  数电:
    - name: "时序逻辑分析"
      frequency: "极高"
      difficulty: "难"
      tips: "驱动方程→状态方程→状态图→自启动"
    - name: "计数器设计"
      frequency: "极高"
      difficulty: "中"
      tips: "置数法和复位法"
    - name: "组合逻辑设计"
      frequency: "高"
      difficulty: "中"
      tips: "抽象→真值表→化简→实现"
    - name: "卡诺图化简"
      frequency: "高"
      difficulty: "中"
      tips: "注意圈组原则和无关项"
    - name: "触发器应用"
      frequency: "高"
      difficulty: "中"
      tips: "特性方程要牢记"

# 常见错误模式
common_mistakes:
  模电:
    - mistake: "反馈类型判断错误"
      correction: "使用短路输出端法判断电压/电流反馈"
      frequency: "高"
    - mistake: "忘记$U_{BE}$"
      correction: "$I_B = (V_{CC} - U_{BE})/R_b$"
      frequency: "中"
    - mistake: "忘记负载电阻"
      correction: "$R'_L = R_c // R_L$"
      frequency: "高"
    - mistake: "混淆虚短虚断条件"
      correction: "线性区才有虚短虚断"
      frequency: "中"

  数电:
    - mistake: "忘记检查自启动"
      correction: "时序逻辑设计必须检查无效状态"
      frequency: "高"
    - mistake: "卡诺图圈组错误"
      correction: "按$2^n$圈组，每个圈尽可能大"
      frequency: "中"
    - mistake: "忘记异步置数端"
